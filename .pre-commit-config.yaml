default_install_hook_types: [pre-commit]

repos:
  # ---------------------------------------------------------------------------
  # Ruff — lint + format
  # Pinned to match pyproject.toml [tool.ruff]
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ---------------------------------------------------------------------------
  # Mypy — strict type checking on src/hrse only.
  # Exclude tests: pyproject.toml already sets files=["src/hrse"] but the
  # mirrors-mypy hook passes changed files explicitly, so we exclude here too.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.1
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml]
        exclude: ^tests/
        additional_dependencies:
          - pydantic==2.8.2
          - pydantic-settings==2.3.4
          - boto3-stubs[s3,secretsmanager,lambda,dynamodb,events]==1.34.144
          - aws-lambda-powertools==2.43.0
          - aws-xray-sdk>=2.15.0

  # ---------------------------------------------------------------------------
  # pytest — runs in the project's uv-managed .venv so hrse is already
  # installed. language: script points at .venv/Scripts/python (Windows) or
  # .venv/bin/python (Unix), which has all deps available.
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: .venv/Scripts/python.exe -m pytest
        language: script
        pass_filenames: false
        always_run: true

  # ---------------------------------------------------------------------------
  # General file hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  # ---------------------------------------------------------------------------
  # Terraform fmt
  # ---------------------------------------------------------------------------
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.92.0
    hooks:
      - id: terraform_fmt
        args: [--args=-recursive]
